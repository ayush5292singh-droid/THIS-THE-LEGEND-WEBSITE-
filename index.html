<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyGenius AI</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="header">

<h1>📚 StudyGenius AI</h1>

<p>Your Personal Study Assistant</p>

<div id="profile">
👤 Student
<br>
⭐ Beginner
</div>

</div>

<div id="messages" class="messages">

<div class="bot">
🤖 <b>StudyGenius AI</b>

<br><br>

Hello 👋

I can help you with:

<br><br>

📘 Mathematics

<br>

🧪 Science

<br>

📖 English

<br>

🌍 Geography

<br>

🏛 History

<br>

📝 Quiz

<br>

💡 Study Tips

</div>

</div>

<div class="progress">

📊 Study Progress

<progress
id="bar"
value="0"
max="100">
</progress>

</div>

<div class="tools">

<button onclick="calculator()">🧮</button>

<button onclick="notes()">📝</button>

<button onclick="planner()">📅</button>

<button onclick="toggleTheme()">🌙</button>

</div>

<div class="input-area">

<input
id="input"
placeholder="Ask anything about your studies..."
>

<button onclick="send()">

Send

</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
