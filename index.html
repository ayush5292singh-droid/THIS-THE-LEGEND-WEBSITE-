<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

I can help you with:

🧪 Science<br>
🌍 Geography<br>
📖 History<br>

Ask me about:
<br><br>

📘 Maths<br>
🧪 Science<br>
🌍 Geography<br>
📖 History<br>
🇬🇧 English

</div>

<div class="tools">

<button onclick="calculator()">🧮 Calculator</button>

<button onclick="notes()">📝 Notes</button>

<button onclick="planner()">📅 Planner</button>

</div>

<div class="input-area">
  

<input
id="input"
placeholder="Ask your study question..."
>

<button onclick="send()">
Send
</button>

</div>

</div>

<script src="script.js"></script>
